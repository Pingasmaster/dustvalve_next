<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 96" width="560" height="96" role="img" aria-label="Download future APK — Android 17 only, bleeding-edge build">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4D3FF"/>
      <stop offset="1" stop-color="#B18CF5"/>
    </linearGradient>
    <linearGradient id="sheenf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipf">
      <rect x="4" y="4" width="552" height="88" rx="44"/>
    </clipPath>
  </defs>

  <!-- pill body -->
  <rect x="4" y="4" width="552" height="88" rx="44" fill="url(#bgf)"/>
  <rect x="4" y="4" width="552" height="88" rx="44" fill="none" stroke="#2A1650" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- breathing glow ring -->
  <rect x="4" y="4" width="552" height="88" rx="44" fill="none" stroke="#F3EAFF" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.1;0.8;0.1" dur="2.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- shimmer sweep (offset phase vs. the stable button) -->
  <g clip-path="url(#clipf)">
    <rect x="-140" y="-10" width="120" height="116" fill="url(#sheenf)" transform="skewX(-18)">
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;780 0" keyTimes="0;1" begin="0.6s" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1"/>
    </rect>
  </g>

  <!-- icon: dark disc, pulsing lightning bolt -->
  <g transform="translate(24 20)">
    <circle cx="28" cy="28" r="28" fill="#2A1650"/>
    <g transform="translate(28 28)">
      <path d="M3.5 -16L-10 3h8l-2.5 13L10 -3H2z" fill="#E4D3FF" stroke="#E4D3FF" stroke-width="1.5" stroke-linejoin="round">
        <animate attributeName="opacity" values="1;0.55;1;1" keyTimes="0;0.45;0.6;1" dur="1.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="1;1.08;1" keyTimes="0;0.55;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      </path>
    </g>
  </g>

  <!-- labels -->
  <text x="104" y="46" font-family="Roboto, 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="0.5" fill="#1D0F3B">DOWNLOAD FUTURE APK</text>
  <text x="104" y="73" font-family="Roboto, 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16.5" font-weight="600" fill="#33205C">Android 17 only&#160;&#160;·&#160;&#160;bleeding-edge build</text>
</svg>
