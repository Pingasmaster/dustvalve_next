<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 560 96" width="560" height="96" role="img" aria-label="Download the secret future APK - Android 17 only">
  <defs>
    <clipPath id="frame">
      <rect x="4" y="4" width="552" height="88" rx="10"/>
    </clipPath>
    <clipPath id="sliceTop">
      <rect x="0" y="0" width="560" height="34"/>
    </clipPath>
    <clipPath id="sliceMid">
      <rect x="0" y="34" width="560" height="26"/>
    </clipPath>
    <clipPath id="sliceBot">
      <rect x="0" y="60" width="560" height="36"/>
    </clipPath>

    <!-- everything that glitches lives in this group -->
    <g id="content">
      <rect x="4" y="4" width="552" height="88" rx="10" fill="#0B0507"/>
      <!-- scanlines -->
      <g fill="#FF2A3C" opacity="0.06">
        <rect x="4" y="12" width="552" height="2"/>
        <rect x="4" y="28" width="552" height="2"/>
        <rect x="4" y="44" width="552" height="2"/>
        <rect x="4" y="60" width="552" height="2"/>
        <rect x="4" y="76" width="552" height="2"/>
      </g>
      <!-- broken border: irregular dashes, one corner "missing" -->
      <rect x="4" y="4" width="552" height="88" rx="10" fill="none" stroke="#FF2A3C" stroke-width="2" stroke-dasharray="64 10 6 14 90 8 30 22 120 6 44 18"/>
      <rect x="9" y="9" width="542" height="78" rx="7" fill="none" stroke="#7A0E18" stroke-width="1" stroke-dasharray="8 26 40 12"/>

      <!-- icon: fractured download arrow in a broken ring -->
      <g transform="translate(24 20)">
        <circle cx="28" cy="28" r="27" fill="none" stroke="#FF2A3C" stroke-width="2.5" stroke-dasharray="52 14 30 18 26 12"/>
        <g fill="none" stroke="#FF2A3C" stroke-width="3.2" stroke-linecap="square">
          <path d="M28 13v9"/>
          <path d="M30 26v6" opacity="0.9"/>
          <path d="M20.5 25.5L28 33l7.5-7.5" transform="translate(-1.5 1)"/>
          <path d="M18 41.5h9"/>
          <path d="M31 41.5h9" transform="translate(0 -2)"/>
        </g>
      </g>

      <!-- title: normal state + two cipher states, swapped by discrete flicker -->
      <g font-family="ui-monospace, 'Cascadia Mono', 'Roboto Mono', Consolas, Menlo, monospace" font-weight="700">
        <text id="t0" x="104" y="46" font-size="23" letter-spacing="1.5" fill="#FF2A3C">DOWNLOAD FUTURE APK
          <animate attributeName="opacity" values="1;1;0;0;1;1;0;1;1" keyTimes="0;0.28;0.281;0.34;0.341;0.72;0.721;0.76;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
        </text>
        <text x="104" y="46" font-size="23" letter-spacing="1.5" fill="#FF2A3C" opacity="0">D0WNL04D F#7URE 4PK
          <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.28;0.281;0.34;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
        </text>
        <text x="104" y="46" font-size="23" letter-spacing="1.5" fill="#FF2A3C" opacity="0">_OWN?OAD =U/URE @]K
          <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.72;0.721;0.76;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
        </text>
        <!-- ghost copy: brief chromatic double -->
        <text x="106" y="46" font-size="23" letter-spacing="1.5" fill="#8A1620" opacity="0">DOWNLOAD FUTURE APK
          <animate attributeName="opacity" values="0;0;0.8;0;0;0.7;0;0" keyTimes="0;0.27;0.28;0.35;0.71;0.72;0.77;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
        </text>
        <text x="104" y="73" font-size="15" letter-spacing="1" fill="#B01623">ANDROID 17 ONLY // IF YOU KNOW YOU KNOW
          <animate attributeName="opacity" values="1;1;0.35;1;1" keyTimes="0;0.5;0.52;0.54;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
        </text>
      </g>

      <!-- stray glitch block -->
      <rect x="470" y="18" width="34" height="5" fill="#FF2A3C" opacity="0">
        <animate attributeName="opacity" values="0;0;0.9;0;0;0.6;0;0" keyTimes="0;0.28;0.29;0.33;0.6;0.61;0.64;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
      </rect>
      <rect x="120" y="80" width="60" height="3" fill="#7A0E18" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.73;0.74;0.78;1" dur="3.7s" calcMode="discrete" repeatCount="indefinite"/>
      </rect>
    </g>
  </defs>

  <!-- assembled from three horizontal slices; outer slices tear sideways in bursts -->
  <g clip-path="url(#frame)">
    <g clip-path="url(#sliceTop)">
      <use xlink:href="#content">
        <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;0 0;-5 0;3 0;0 0;0 0;6 0;-2 0;0 0" keyTimes="0;0.27;0.28;0.31;0.34;0.71;0.72;0.75;0.78" dur="3.7s" repeatCount="indefinite"/>
      </use>
    </g>
    <g clip-path="url(#sliceMid)">
      <use xlink:href="#content">
        <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;0 0;4 0;-6 0;0 0;0 0;-4 0;0 0" keyTimes="0;0.28;0.29;0.32;0.35;0.72;0.73;0.77" dur="3.7s" repeatCount="indefinite"/>
      </use>
    </g>
    <g clip-path="url(#sliceBot)">
      <use xlink:href="#content">
        <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;0 0;-3 0;2 0;0 0" keyTimes="0;0.29;0.30;0.33;0.36" dur="3.7s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>
</svg>
