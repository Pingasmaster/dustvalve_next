name: Build Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-modern:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Write signing password
        run: echo "${{ secrets.KEYSTORE_PASSWORD }}" > .password-signing-keys

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk

  build-legacy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout legacy-android8 branch
        uses: actions/checkout@v4
        with:
          ref: legacy-android8

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Write signing password
        run: echo "${{ secrets.KEYSTORE_PASSWORD }}" > .password-signing-keys

      - name: Build legacy release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to dustvalve-old.apk
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/dustvalve-old.apk

      - name: Upload legacy APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/dustvalve-old.apk