name: Build Release APK

on:
  release:
    types: [published]

# One run per ref: a newer push supersedes the in-flight run for the same
# branch, so stale commits stop burning runner minutes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-modern:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      # The in-app updater compares the release tag against
      # BuildConfig.VERSION_NAME. If the tagged commit does not carry the
      # matching versionName, every install of this release re-prompts to
      # "update" to itself forever. Fail fast before burning build minutes.
      - name: Gate - tag must match versionName in app/build.gradle.kts
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gradle_version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts)
          if [ "$gradle_version" != "$tag_version" ]; then
            echo "::error title=Version gate::Tag ${GITHUB_REF_NAME} expects versionName '${tag_version}' but app/build.gradle.kts has '${gradle_version}'. Commit the release version to master BEFORE tagging, or the in-app updater will loop on this release."
            exit 1
          fi
          echo "Version gate OK: tag ${GITHUB_REF_NAME} matches versionName ${gradle_version} on master" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: check.yml's check job is the repo's sole cache writer.
          cache-read-only: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Write signing password
        run: echo "${{ secrets.KEYSTORE_PASSWORD }}" > .password-signing-keys

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to dustvalve_next-future.apk
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/dustvalve_next-future.apk

      - name: Report APK size
        run: |
          apk=app/build/outputs/apk/release/dustvalve_next-future.apk
          {
            echo "### APK size - dustvalve_next-future.apk"
            echo
            echo '| Metric | Size |'
            echo '| --- | --- |'
            echo "| File size | $(du -h "$apk" | cut -f1) ($(stat -c%s "$apk") bytes) |"
            echo "| DEX (uncompressed) | $(unzip -l "$apk" '*.dex' | tail -1 | awk '{printf "%.1f MB", $1/1048576}') |"
            echo "| Native libs (uncompressed) | $(unzip -l "$apk" 'lib/*' | tail -1 | awk '{printf "%.1f MB", $1/1048576}') |"
          } >> "$GITHUB_STEP_SUMMARY"
          size=$(stat -c%s "$apk")
          if [ "$size" -gt $((10 * 1024 * 1024)) ]; then
            echo "::warning title=APK size::Release APK is $(du -h "$apk" | cut -f1) (> 10 MB budget). Investigate size regression."
          fi

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: app/build/outputs/apk/release/dustvalve_next-future.apk

  build-legacy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout legacy-android8 branch
        uses: actions/checkout@v7.0.0
        with:
          ref: legacy-android8

      # legacy-android8 is checked out at its MUTABLE branch tip (the tag
      # points at a master commit). Record exactly which SHA this release's
      # legacy APK was built from so releases stay traceable.
      - name: Resolve legacy-android8 SHA
        run: |
          legacy_sha=$(git rev-parse HEAD)
          echo "Building legacy APK from legacy-android8 @ ${legacy_sha}"
          echo "Legacy APK built from legacy-android8 @ ${legacy_sha}" >> "$GITHUB_STEP_SUMMARY"

      # Same gate as build-modern: the legacy branch carries its own
      # versionName (BuildConfig.VERSION_NAME on Android 8-16 installs) and
      # the legacy in-app updater compares it against the release tag.
      # Master AND legacy-android8 must BOTH have the release version
      # committed before the tag is published.
      - name: Gate - tag must match versionName on legacy-android8
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gradle_version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts)
          if [ "$gradle_version" != "$tag_version" ]; then
            echo "::error title=Version gate (legacy)::Tag ${GITHUB_REF_NAME} expects versionName '${tag_version}' but legacy-android8's app/build.gradle.kts has '${gradle_version}'. Commit the release version to legacy-android8 BEFORE tagging, or the legacy in-app updater will loop on this release."
            exit 1
          fi
          echo "Version gate OK: tag ${GITHUB_REF_NAME} matches versionName ${gradle_version} on legacy-android8" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: check.yml's check job is the repo's sole cache writer.
          cache-read-only: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks

      - name: Write signing password
        run: echo "${{ secrets.KEYSTORE_PASSWORD }}" > .password-signing-keys

      - name: Build legacy release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to dustvalve_next.apk
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/dustvalve_next.apk

      - name: Upload legacy APK to GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: app/build/outputs/apk/release/dustvalve_next.apk