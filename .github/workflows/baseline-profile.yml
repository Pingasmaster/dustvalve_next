name: Regenerate Baseline + Startup Profile

# Deliberately NOT triggered by pull_request: this job holds contents:write /
# pull-requests:write, and workflows must never run on unreviewed fork code.
# Runs on commits landed on master and on manual dispatch only.
on:
  push:
    branches: [master]
  workflow_dispatch:

# One run per ref: a newer push supersedes the in-flight run for the same
# branch, so stale commits stop burning runner minutes.
concurrency:
  group: baseline-profile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  baseline-profile:
    name: Generate Baseline + Startup Profile (release, API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: check.yml's check job is the repo's sole cache writer.
          cache-read-only: true

      - name: Setup GMD (Pixel 7a, API 33, AOSP)
        run: >-
          ./gradlew :baselineprofile:pixel7aApi33Setup --info
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Generate Baseline + Startup Profile
        run: >-
          ./gradlew :app:assembleRelease
          -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=baselineprofile
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Annotate failures (public check-run annotations)
        if: failure()
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          for f in glob.glob('**/build/outputs/androidTest-results/**/*.xml', recursive=True):
              try: root = ET.parse(f).getroot()
              except Exception: continue
              for case in root.iter('testcase'):
                  for kind in ('failure', 'error'):
                      for node in case.findall(kind):
                          name = f"{case.get('classname')}#{case.get('name')}"
                          text = (node.text or node.get('message') or '')[:600]
                          text = text.replace('%', '%25').replace('\r', '').replace('\n', '%0A')
                          print(f"::error title={name}::{text}")
          PY

      - name: Upload device logs on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: baseline-profile-results
          path: |
            baselineprofile/build/outputs/androidTest-results/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore

      - name: Open PR with regenerated profiles
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: bot/baseline-profile-regen
          title: "chore(baseline-profile): regenerate baseline-prof.txt + startup-prof.txt"
          commit-message: "chore(baseline-profile): regenerate from API 33 / Pixel 7a"
          body: |
            Automated regeneration via the baseline-profile CI workflow.
            See app/src/release/generated/baselineProfiles/ for the diff.
          add-paths: |
            app/src/release/generated/baselineProfiles/baseline-prof.txt
            app/src/release/generated/baselineProfiles/startup-prof.txt
