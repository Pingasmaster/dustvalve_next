name: Checks (lint, tests, screenshots)

# Deliberately NOT triggered by pull_request: workflows must never run on
# unreviewed fork code, so nothing here can be aimed at repo credentials.
# Runs on commits landed on master and on manual dispatch only.
on:
  push:
    branches: [legacy-android8]
  workflow_dispatch:
    inputs:
      live_soft_fail:
        description: >-
          Treat live-network E2E failures as warnings (use during a known
          Bandcamp/YouTube service incident).
        type: boolean
        default: false

# One run per ref: a newer push supersedes the in-flight run for the same
# branch, so stale commits stop burning runner minutes.
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# JEP 498 opt-in (sun.misc.Unsafe accessors) for forked JVMs that honor the
# environment (test executors, benchmarks). KNOWN RESIDUAL WARNING: ktlint's
# worker daemon gets a sanitized environment and exposes no JVM-args hook, and
# every published kotlin-compiler-embeddable (2.2-2.4) still calls
# Unsafe.objectFieldOffset - so ktlint tasks print a 4-line JEP 498 warning
# that cannot currently be fixed on our side. Remove this note when
# ktlint-gradle grows a worker jvmArgs option or the bundled compiler stops
# using Unsafe.
env:
  JAVA_TOOL_OPTIONS: --sun-misc-unsafe-memory-access=allow

jobs:
  check:
    name: ktlint + detekt + lint + unit tests + locale screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: ASCII-only source check
        run: ./scripts/check_ascii.sh

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Cache policy: this job is the single cache writer for the repo;
          # all other jobs/workflows set cache-read-only (10 GB limit was
          # being filled by every job saving its own multi-GB entry).

      - name: Style (ktlint + detekt)
        run: ./gradlew ktlintCheck detekt

      - name: Android Lint (all modules, warnings-as-errors)
        run: ./gradlew lintRelease

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Locale screenshot verification (Roborazzi)
        run: ./gradlew :app:verifyRoborazziDebug

      - name: Annotate failures (public check-run annotations)
        if: failure()
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          for f in glob.glob('**/build/test-results/**/*.xml', recursive=True):
              try: root = ET.parse(f).getroot()
              except Exception: continue
              for case in root.iter('testcase'):
                  for kind in ('failure', 'error'):
                      for node in case.findall(kind):
                          name = f"{case.get('classname')}#{case.get('name')}"
                          text = (node.text or node.get('message') or '')[:600]
                          text = text.replace('%', '%25').replace('\r', '').replace('\n', '%0A')
                          print(f"::error title={name}::{text}")
          for f in glob.glob('app/src/test/snapshots/roborazzi/*_compare.png'):
              print(f"::error title=roborazzi::screenshot diff: {f}")
          PY

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: roborazzi-diffs
          path: |
            app/src/test/snapshots/roborazzi/*_compare.png
            app/build/outputs/roborazzi/
          if-no-files-found: ignore

  # Tier 2: on-device smoke on a Gradle Managed Device. Pinned to the exact
  # v0.5.0 regressions: local playback must advance past 0:00 and the
  # Bandcamp / YouTube Music surfaces must open without crashing.
  emulator-smoke:
    name: emulator smoke (GMD pixel7aApi33)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: the check job is the sole cache writer (see above).
          cache-read-only: true

      - name: Setup GMD (Pixel 7a, API 33, AOSP)
        run: >-
          ./gradlew :app:pixel7aApi33Setup
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Smoke suite (debug APK)
        run: >-
          ./gradlew :app:pixel7aApi33DebugAndroidTest
          -Pandroid.testInstrumentationRunnerArguments.annotation=com.dustvalve.next.android.testing.SmokeTest
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Annotate failing tests (public check-run annotations)
        if: failure()
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          for f in glob.glob('app/build/outputs/androidTest-results/**/*.xml', recursive=True):
              try: root = ET.parse(f).getroot()
              except Exception: continue
              for case in root.iter('testcase'):
                  for kind in ('failure', 'error'):
                      for node in case.findall(kind):
                          msg = (node.get('message') or (node.text or '').strip().splitlines()[0:1] or [''])
                          msg = msg if isinstance(msg, str) else (msg[0] if msg else '')
                          name = f"{case.get('classname')}#{case.get('name')}"
                          text = (node.text or '')[:600].replace('%', '%25').replace('\r', '').replace('\n', '%0A')
                          print(f"::error title={name}::{text or msg}")
          PY

      - name: Assert tests actually ran
        if: success()
        run: bash scripts/ci_assert_tests_ran.sh 3

      - name: Surface app logcat (success or failure)
        if: always()
        run: bash scripts/ci_surface_logcat.sh

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results
          path: app/build/outputs/androidTest-results/managedDevice/
          if-no-files-found: ignore

  # Same smoke suite against the MINIFIED release APK (R8 full mode +
  # resource shrinking). The v0.5.0/v0.5.1 'playback dead in prod' reports
  # came from release builds while every debug-APK test was green - this
  # lane exists to reproduce release-only breakage in CI. The release APK
  # falls back to debug signing here (no keystore in this job), which is
  # exactly what lets the debug-signed test APK instrument it.
  emulator-smoke-release:
    name: emulator smoke (RELEASE APK, R8 full mode)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: the check job is the sole cache writer (see above).
          cache-read-only: true

      - name: Setup GMD (Pixel 7a, API 33, AOSP)
        run: >-
          ./gradlew :app:pixel7aApi33Setup
          -PtestReleaseBuild
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Smoke suite (minified release APK)
        run: |
          set -o pipefail
          ./gradlew :app:pixel7aApi33ReleaseAndroidTest \
            -PtestReleaseBuild \
            -Pandroid.testInstrumentationRunnerArguments.class=com.dustvalve.next.android.smoke.AppSmokeTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            2>&1 | tee gradle-release-smoke.log

      - name: Annotate Gradle output tail on failure
        if: failure()
        run: |
          python3 - <<'PY'
          # The release lane can fail before any JUnit XML exists (install,
          # R8, device errors). Surface the last Gradle lines as a public
          # annotation so the failure is diagnosable without job-log auth.
          try:
              lines = open('gradle-release-smoke.log', encoding='utf-8', errors='replace').read().splitlines()
          except FileNotFoundError:
              lines = ['gradle-release-smoke.log missing - step failed before Gradle ran']
          interesting = [l for l in lines if l.strip()][-45:]
          text = '%0A'.join(l[:300].replace('%', '%25') for l in interesting)[:3800]
          print(f"::error title=release-smoke-gradle-tail::{text}")
          PY

      - name: Annotate failing tests (public check-run annotations)
        if: failure()
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          for f in glob.glob('app/build/outputs/androidTest-results/**/*.xml', recursive=True):
              try: root = ET.parse(f).getroot()
              except Exception: continue
              for case in root.iter('testcase'):
                  for kind in ('failure', 'error'):
                      for node in case.findall(kind):
                          msg = (node.get('message') or (node.text or '').strip().splitlines()[0:1] or [''])
                          msg = msg if isinstance(msg, str) else (msg[0] if msg else '')
                          name = f"{case.get('classname')}#{case.get('name')}"
                          text = (node.text or '')[:600].replace('%', '%25').replace('\r', '').replace('\n', '%0A')
                          print(f"::error title={name}::{text or msg}")
          PY

      - name: Assert tests actually ran
        if: success()
        run: bash scripts/ci_assert_tests_ran.sh 3

      - name: Surface app logcat (success or failure)
        if: always()
        run: bash scripts/ci_surface_logcat.sh

      - name: Upload release smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-smoke-results
          path: app/build/outputs/androidTest-results/managedDevice/
          if-no-files-found: ignore

  # Tier 3: full E2E. Hermetic and live passes run as SEPARATE invocations so
  # a Bandcamp/YouTube outage can never mask a hermetic regression.
  emulator-e2e:
    name: emulator E2E (hermetic + live)
    needs: emulator-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 25
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
          # Read-only: the check job is the sole cache writer (see above).
          cache-read-only: true

      - name: Setup GMD (Pixel 7a, API 33, AOSP)
        run: >-
          ./gradlew :app:pixel7aApi33Setup
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: E2E hermetic pass
        run: >-
          ./gradlew :app:pixel7aApi33DebugAndroidTest
          -Pandroid.testInstrumentationRunnerArguments.notAnnotation=com.dustvalve.next.android.testing.LiveNetwork
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: E2E live pass (real Bandcamp + YouTube)
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.live_soft_fail }}
        run: >-
          ./gradlew :app:pixel7aApi33DebugAndroidTest
          -Pandroid.testInstrumentationRunnerArguments.annotation=com.dustvalve.next.android.testing.LiveNetwork
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect

      - name: Annotate failing tests (public check-run annotations)
        if: failure()
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          for f in glob.glob('app/build/outputs/androidTest-results/**/*.xml', recursive=True):
              try: root = ET.parse(f).getroot()
              except Exception: continue
              for case in root.iter('testcase'):
                  for kind in ('failure', 'error'):
                      for node in case.findall(kind):
                          msg = (node.get('message') or (node.text or '').strip().splitlines()[0:1] or [''])
                          msg = msg if isinstance(msg, str) else (msg[0] if msg else '')
                          name = f"{case.get('classname')}#{case.get('name')}"
                          text = (node.text or '')[:600].replace('%', '%25').replace('\r', '').replace('\n', '%0A')
                          print(f"::error title={name}::{text or msg}")
          PY

      - name: Assert tests actually ran
        if: success()
        run: bash scripts/ci_assert_tests_ran.sh 3

      - name: Surface app logcat (success or failure)
        if: always()
        run: bash scripts/ci_surface_logcat.sh

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-results
          path: app/build/outputs/androidTest-results/managedDevice/
          if-no-files-found: ignore
